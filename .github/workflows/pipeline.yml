name: CI/CD Pipeline

on:
  push:
    branches:
      - '**'
    paths-ignore:
      - "Wiki/**"
      - "README.md"
      - ".gitignore"
  pull_request:
    branches:
      - '**'
    paths-ignore:
      - "Wiki/**"
      - "README.md"
      - ".gitignore"
  workflow_dispatch:
  release:

    types:
      - published
      - edited

env:
  DOCKER_IMAGE: lgcorzo/dark-gravity-factory
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  governance-gates:
    name: Governance Gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify Spec Artifacts
        if: startsWith(github.head_ref, 'specs/') || startsWith(github.ref, 'refs/heads/specs/')
        run: |
          echo "Verifying Spec Artifacts for Spec-Driven Development..."
          # Ensure there is at least one spec.md, plan.md, and tasks.md in the specs/ directory
          if [ -z "$(find specs -name 'spec.md' 2>/dev/null)" ] || [ -z "$(find specs -name 'plan.md' 2>/dev/null)" ] || [ -z "$(find specs -name 'tasks.md' 2>/dev/null)" ]; then
            echo "::error::Missing required spec artifacts (spec.md, plan.md, tasks.md) on a specs/ branch."
            exit 1
          fi
          echo "Spec artifacts verified."

      - name: Verify OSR Threshold
        run: |
          chmod +x scripts/verify-osr.sh || true
          ./scripts/verify-osr.sh

      - name: Install cargo-audit
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit

      - name: Cargo Audit
        run: cargo audit -D warnings

  rust-ci:
    name: Rust CI (Lint & Test)
    needs: governance-gates
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust Toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: 1.94.1
          components: rustfmt, clippy
          
      - name: Install Protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler libcurl4-openssl-dev

          
      - name: Check Formatting
        run: cargo fmt --all -- --check
        
      - name: Lint with Clippy
        run: cargo clippy --workspace -- -D warnings
        
      - name: Run Workspace Tests
        run: cargo test --workspace -- --skip smoke

  docker-publish:
    name: Docker Publish
    needs: rust-ci
    if: github.event_name != 'pull_request' && (github.ref == 'refs/heads/main' || github.event_name == 'release')
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v6
        with:
          push: true
          context: .
          cache-to: type=gha,mode=max
          cache-from: type=gha
          tags: |
            ${{ env.DOCKER_IMAGE }}:latest
            ${{ env.DOCKER_IMAGE }}:${{ github.sha }}
