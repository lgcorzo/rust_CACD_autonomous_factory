apiVersion: apps/v1
kind: Deployment
metadata:
  name: factory-mcp-server
  namespace: factory
  labels:
    app: factory-mcp-server
spec:
  replicas: 2
  selector:
    matchLabels:
      app: factory-mcp-server
  template:
    metadata:
      labels:
        app: factory-mcp-server
    spec:
      containers:
      - name: mcp-server
        image: docker.io/lgcorzo/dark-gravity-factory:latest
        command: ["/usr/local/bin/factory-mcp-server"]
        ports:
        - containerPort: 8100
        env:
        - name: PORT
          value: "8100"
        - name: LITELLM_API_KEY
          valueFrom:
            secretKeyRef:
              name: opencode-secrets
              key: LITELLM_API_KEY
        - name: LITELLM_BASE_URL
          value: "http://litellm.llm-apps.svc.cluster.local/v1"
        - name: R2R_BASE_URL
          value: "http://r2r.llm-apps.svc.cluster.local:7272"
        resources:
          limits:
            cpu: "500m"
            memory: "512Mi"
          requests:
            cpu: "100m"
            memory: "128Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: factory-mcp-server
  namespace: factory
spec:
  selector:
    app: factory-mcp-server
  ports:
  - protocol: TCP
    port: 8100
    targetPort: 8100
  type: ClusterIP
