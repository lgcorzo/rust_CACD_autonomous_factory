# This is a template for the SealedSecret. 
# You should create a regular Secret first, then seal it using:
# kubeseal --format yaml < secret.yaml > opencode-sealed-secret.yaml
---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: opencode-secrets
  namespace: factory
spec:
  encryptedData:
    LITELLM_API_KEY: "PLACEHOLDER_ENCRYPTED_KEY"
    OPENCODE_API_KEY: "PLACEHOLDER_ENCRYPTED_KEY"
  template:
    metadata:
      name: opencode-secrets
      namespace: factory
    type: Opaque
