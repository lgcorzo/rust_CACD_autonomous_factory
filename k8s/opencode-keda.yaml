apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: opencode-agent-scaler
  namespace: factory
spec:
  scaleTargetRef:
    name: opencode-agent
  minReplicaCount: 0
  maxReplicaCount: 10
  pollingInterval: 30
  cooldownPeriod: 300
  triggers:
    - type: kafka
      metadata:
        bootstrapServers: my-kafka.confluent.svc:9092
        topic: mission-input
        consumerGroup: opencode-workers
        lagThreshold: "1"
        offsetResetPolicy: latest
