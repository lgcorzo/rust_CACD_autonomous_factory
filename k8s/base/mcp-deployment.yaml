apiVersion: apps/v1
kind: Deployment
metadata:
  name: mcp-server
  namespace: agents
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mcp-server
  template:
    metadata:
      labels:
        app: mcp-server
    spec:
      enableServiceLinks: false
      containers:
        - name: mcp-server
          image: lgcorzo/llmops-python-package:latest
          command: ["python", "-m", "autogen_team.application.mcp.mcp_server"]
          ports:
            - containerPort: 8200
          envFrom:
            - configMapRef:
                name: opencode-mcp-config
            - secretRef:
                name: llmops-secrets
          resources:
            limits:
              memory: "512Mi"
              cpu: "250m"
            requests:
              memory: "256Mi"
              cpu: "100m"
          livenessProbe:
            tcpSocket:
              port: 8200
            initialDelaySeconds: 15
            periodSeconds: 30
          readinessProbe:
            tcpSocket:
              port: 8200
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: mcp-server
  namespace: agents
spec:
  selector:
    app: mcp-server
  ports:
    - protocol: TCP
      port: 8200
      targetPort: 8200
  type: ClusterIP
