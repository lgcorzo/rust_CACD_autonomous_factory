apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: opencode-agent-scaler
  namespace: agents
spec:
  scaleTargetRef:
    name: opencode-agent
  minReplicaCount: 0 # Scale to zero when idle — zero cost
  maxReplicaCount: 5 # Max parallel agents
  cooldownPeriod: 300 # 5 min cooldown before scale-down
  triggers:
    - type: kafka
      metadata:
        bootstrapServers: my-kafka-cluster.confluent.svc.cluster.local:9092
        topic: mission-input
        consumerGroup: opencode-agents
        lagThreshold: "1"
      authenticationRef:
        name: keda-trigger-auth
