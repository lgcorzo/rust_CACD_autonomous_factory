apiVersion: v1
kind: ConfigMap
metadata:
  name: opencode-agent-config
  namespace: agents
data:
  opencode.json: |
    {
      "$schema": "https://opencode.ai/config.json",
      "provider": {
        "litellm": {
          "npm": "@ai-sdk/openai-compatible",
          "name": "LiteLLM Gateway",
          "options": {
            "baseURL": "http://litellm.llm-apps.svc.cluster.local:4000/v1"
          },
          "models": {
            "gemini/gemini-2.5-pro": {
              "name": "Gemini 2.5 Pro"
            }
          }
        }
      },
      "mcp": {
        "factory": {
          "type": "remote",
          "url": "http://mcp-server.agents.svc.cluster.local:8200/sse",
          "enabled": true
        }
      },
      "permission": {
        "bash": "deny",
        "edit": "deny",
        "write": "deny",
        "webfetch": "deny",
        "websearch": "deny",
        "read": "allow",
        "grep": "allow",
        "glob": "allow",
        "list": "allow",
        "factory_*": "allow"
      }
    }
