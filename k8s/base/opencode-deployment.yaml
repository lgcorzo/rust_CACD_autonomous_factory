apiVersion: apps/v1
kind: Deployment
metadata:
  name: opencode-agent
  namespace: agents
spec:
  replicas: 0 # KEDA manages replicas (0→N)
  selector:
    matchLabels:
      app: opencode-agent
  template:
    metadata:
      labels:
        app: opencode-agent
    spec:
      initContainers:
        - name: inject-api-key
          image: busybox:1.36
          command: ["sh", "-c"]
          args:
            - cp /tmp/config/opencode.json /app-config/opencode.json && sed -i "s/REPLACE_ME_LITELLM_API_KEY/${LITELLM_API_KEY}/g" /app-config/opencode.json
          env:
            - name: LITELLM_API_KEY
              valueFrom:
                secretKeyRef:
                  name: litellm-secrets
                  key: LITELLM_MASTER_KEY
                  optional: true
          volumeMounts:
            - name: config-template
              mountPath: /tmp/config
            - name: app-config
              mountPath: /app-config
      containers:
        - name: opencode
          image: ghcr.io/anomalyco/opencode:beta
          args: ["serve", "--port", "4096", "--hostname", "0.0.0.0"]
          ports:
            - containerPort: 4096 # OpenCode REST API / SDK
          env:
            # Hatchet connection
            - name: HATCHET_CLIENT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: hatchet-admin-token
                  key: token
            - name: HATCHET_CLIENT_HOST_PORT
              value: "hatchet.orchestrators.svc.cluster.local:7077"
            - name: HATCHET_CLIENT_TLS_STRATEGY
              value: "none"
            # LiteLLM API key
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: litellm-secrets
                  key: LITELLM_MASTER_KEY
                  optional: true
            - name: LITELLM_API_KEY
              valueFrom:
                secretKeyRef:
                  name: litellm-secrets
                  key: LITELLM_MASTER_KEY
                  optional: true
            - name: LITELLM_API_KEY
              valueFrom:
                secretKeyRef:
                  name: litellm-secrets
                  key: LITELLM_MASTER_KEY
                  optional: true
            - name: OPENCODE_MODEL
              value: "litellm/minimax-m2.7:cloud"
            - name: OPENCODE_CONFIG
              value: "/app/opencode.json"
          volumeMounts:
            - name: app-config
              mountPath: /app/opencode.json
              subPath: opencode.json
            - name: workspace
              mountPath: /workspace
          resources:
            requests:
              memory: "512Mi"
              cpu: "500m"
            limits:
              memory: "2Gi"
              cpu: "2"
          livenessProbe:
            httpGet:
              path: /health
              port: 4096
            initialDelaySeconds: 15
            periodSeconds: 30
      volumes:
        - name: config-template
          configMap:
            name: opencode-agent-config
        - name: app-config
          emptyDir: {}
        - name: workspace
          emptyDir:
            sizeLimit: 10Gi # Ephemeral, per-pod — enables KEDA scaling
